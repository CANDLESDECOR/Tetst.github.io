<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:-apple-system;
background:#000;
color:#fff;
padding:20px;
}

.top{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

button{
background:#111;
border:none;
color:#fff;
padding:8px 12px;
border-radius:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.card{
border-radius:20px;
overflow:hidden;
background:#111;
cursor:pointer;
transition:0.3s;
animation:fade 0.4s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card h3{
padding:10px;
font-size:14px;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1}
}
</style>
</head>

<body>

<div class="top">
<a href="index.html">← Назад</a>
<button onclick="shuffle()">Random</button>
</div>

<h2 id="title"></h2>

<div id="grid" class="grid"></div>

<script>

let products=[
{title:"Classic Candle",cat:"classic",img:"1.jpg"},
{title:"Loft Candle",cat:"loft",img:"2.jpg"},
{title:"Kashpo Candle",cat:"kashpo",img:"3.jpg"},
{title:"Dessert Candle",cat:"dessert",img:"4.jpg"}
];

const params=new URLSearchParams(location.search);
const cat=params.get("cat");

document.getElementById("title").innerText=cat;

function render(){
let grid=document.getElementById("grid");
grid.innerHTML="";

products.filter(p=>p.cat===cat).forEach(p=>{
grid.innerHTML+=`
<div class="card" onclick="openProduct('${p.title}','${p.img}')">
<img src="${p.img}">
<h3>${p.title}</h3>
</div>
`;
});
}

function shuffle(){
products.sort(()=>Math.random()-0.5);
render();
}

function openProduct(title,img){
location=`product.html?title=${title}&img=${img}`;
}

render();

</script>

</body>
</html>
