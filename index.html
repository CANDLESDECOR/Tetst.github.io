<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANDLES HOME</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:#fff;
  background:radial-gradient(circle at top,#4a3b2a,#1a1a1a,#000);
}

/* заголовок */
h1{
  padding:20px;
  margin:0;
}

/* баннер */
.slider{
  overflow:hidden;
  margin:15px;
}

.slides{
  display:flex;
  gap:10px;
  animation:scroll 30s linear infinite;
}

.slide{
  min-width:260px;
  height:130px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:20px;

  background:linear-gradient(145deg,rgba(255,200,120,0.25),rgba(255,255,255,0.08));

  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

@keyframes scroll{
  0%{transform:translateX(0);}
  100%{transform:translateX(-50%);}
}

/* сетка */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

/* карточки */
.card{
  display:flex;
  align-items:center;
  justify-content:center;
  height:110px;
  border-radius:20px;

  background:linear-gradient(145deg,rgba(255,220,150,0.15),rgba(255,255,255,0.05));
  border:1px solid rgba(255,200,120,0.2);

  font-size:18px;
  font-weight:600;
}

/* ссылки */
a{
  text-decoration:none;
  color:#fff;
}

/* кнопка корзины */
.cart-btn{
  position:fixed;
  top:20px;
  right:20px;

  width:55px;
  height:55px;

  border-radius:50%;
  background:rgba(255,255,255,0.1);

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:22px;
  cursor:pointer;
}

/* корзина */
.cart{
  position:fixed;
  top:0;
  right:-100%;

  width:85%;
  height:100%;

  padding:20px;

  background:rgba(20,20,20,0.95);
  backdrop-filter:blur(25px);

  transition:0.3s;
}

.cart.active{
  right:0;
}

.cart input{
  width:100%;
  padding:14px;
  margin-bottom:10px;
  border-radius:14px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:#fff;
}

.cart button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;
  background:#444;
  color:#fff;
}

/* футер */
.footer{
  text-align:center;
  padding:20px;
  color:#aaa;
}
</style>

</head>

<body>

<h1>CANDLES HOME</h1>

<!-- кнопка корзины -->
<div class="cart-btn" onclick="toggleCart()">🛒</div>

<!-- баннер -->
<div class="slider">
  <div class="slides">
    <div class="slide">Promo1</div>
    <div class="slide">Promo2</div>
    <div class="slide">Promo3</div>
    <div class="slide">Promo4</div>

    <div class="slide">Promo1</div>
    <div class="slide">Promo2</div>
    <div class="slide">Promo3</div>
    <div class="slide">Promo4</div>
  </div>
</div>

<!-- категории -->
<div class="grid">
  <a href="#" class="card">Classic</a>
  <a href="#" class="card">Loft</a>
  <a href="#" class="card">Десертні</a>
  <a href="#" class="card">Кашпо</a>
</div>

<!-- корзина -->
<div class="cart">
  <h3>Кошик</h3>

  <div id="cart-items">Порожньо</div>

  <input id="name" placeholder="Ваше ім’я">
  <input id="phone" placeholder="Телефон">

  <button onclick="order()">Замовити</button>
</div>

<!-- футер -->
<div class="footer">
  Instagram: candleshome.store<br>
  Telegram: Candles_Home_Catalog
</div>

<script>
function toggleCart(){
  document.querySelector(".cart").classList.toggle("active");
}

function order(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;

  let text = "🔥 Замовлення\n👤 " + name + "\n📞 " + phone;

  fetch("https://api.telegram.org/bot8309821481:AA.../sendMessage", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      chat_id:"862977657",
      text:text
    })
  });

  alert("Заявка відправлена 🔥");
}
</script>

</body>
</html>
