<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANDLES HOME</title>

<style>
body{
margin:0;
font-family:-apple-system;
background:#000;
color:#fff;
}

h1{
padding:20px;
font-size:28px;
}

/* БАННЕР */
.banner{
height:200px;
background:url('https://images.unsplash.com/photo-1603006905003-be475563bc59') center/cover;
border-radius:20px;
margin:0 16px;
}

/* СЕТКА */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
padding:16px;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:20px;
padding:12px;
text-align:center;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:12px;
margin-bottom:10px;
}

/* КНОПКА КОРЗИНЫ */
.cart-btn{
position:fixed;
right:16px;
bottom:20px;
width:60px;
height:60px;
border-radius:50%;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(20px);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
z-index:999;
}

/* ЗАТЕМНЕНИЕ */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
opacity:0;
pointer-events:none;
transition:0.3s;
z-index:997;
}

.overlay.active{
opacity:1;
pointer-events:auto;
}

/* КОРЗИНА */
.cart{
position:fixed;
left:0;
bottom:-100%;
width:100%;
background:rgba(0,0,0,0.95);
backdrop-filter:blur(20px);
padding:20px;
border-top-left-radius:20px;
border-top-right-radius:20px;
transition:0.4s;
z-index:998;
}

.cart.active{
bottom:0;
}

input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:none;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-weight:600;
}
</style>
</head>

<body>

<h1>CANDLES HOME</h1>

<div class="banner"></div>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1602524810801-61f3954ed7be">
Лофт
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1616628182506-1f3f954ed7be">
Класик
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1602874801006-e26f3c1d0c92">
Десерт
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1616627454026-48c58c2c299c">
Свічки в кашпо
</div>

</div>

<!-- затемнение -->
<div class="overlay" onclick="toggleCart()"></div>

<!-- корзина -->
<div class="cart">
<div>Кошик порожній</div>

<input id="name" placeholder="Ім'я">
<input id="phone" placeholder="Телефон">

<button onclick="order()">Швидке замовлення</button>
</div>

<!-- кнопка -->
<div class="cart-btn" onclick="toggleCart()">🛒</div>

<script>
function toggleCart(){
document.querySelector('.cart').classList.toggle('active');
document.querySelector('.overlay').classList.toggle('active');
}

function order(){
let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;

if(!name || !phone){
alert("Заповни дані");
return;
}

let text = "НОВЕ ЗАМОВЛЕННЯ\nІм'я: " + name + "\nТелефон: " + phone;

fetch("https://api.telegram.org/bot8706193551:AAELif4O7facDZT6JKYQGRpqx5kBsJ3CkyE/sendMessage", {
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id:"862977657",
text:text
})
}).then(()=>alert("Відправлено"));
}
</script>

</body>
</html>
