<style>
body{
  background:
    radial-gradient(circle at top, #3a3a3a 0%, #1a1a1a 40%, #000 100%);
}

/* заголовок */
h1{
  color:#f5f5f5;
  text-shadow:
    0 0 10px rgba(255,200,120,0.2),
    0 0 25px rgba(255,180,80,0.1);
}

/* баннеры */
.slider{
  overflow:hidden;
  margin:15px;
  border-radius:20px;
}

.slides{
  display:flex;
  gap:10px;
  animation:scroll 20s linear infinite;
}

.slide{
  min-width:250px;
  height:120px;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:20px;

  background:rgba(255,255,255,0.1);
}
  box-shadow:
    0 10px 30px rgba(0,0,0,0.4),
    0 0 20px rgba(255,255,255,0.08);
}

@keyframes scroll{
  0%{transform:translateX(0);}
  100%{transform:translateX(-50%);}
}

/* карточки */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

.card{
  display:flex;
  align-items:center;
  justify-content:center;

  height:100px;

  border-radius:20px;

  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);

  border:1px solid rgba(255,255,255,0.1);

  color:#fff;
  font-size:18px;
  font-weight:600;

  box-shadow:0 8px 25px rgba(0,0,0,0.4);
}

.card:hover{
  background:
    linear-gradient(145deg, rgba(255,255,255,0.25), rgba(255,255,255,0.08));

  box-shadow:
    0 15px 40px rgba(0,0,0,0.5),
    0 0 30px rgba(255,255,255,0.15);
}

.card:active{
  transform:scale(0.98);
}

/* кнопка корзины */
.cart-btn{
  position:fixed;
  top:20px;
  right:20px;
  width:56px;
  height:56px;
  border-radius:50%;
  background:
    linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  color:#fff;
  z-index:1000;
  box-shadow:
    0 10px 30px rgba(0,0,0,0.45),
    inset 0 1px 0 rgba(255,255,255,0.08);
}

/* overlay */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(6px);
  opacity:0;
  pointer-events:none;
  transition:0.3s;
  z-index:998;
}

.overlay.active{
  opacity:1;
  pointer-events:auto;
}

/* корзина */
.cart{
  position:fixed;
  top:0;
  right:-100%;
  width:80%;
  height:100%;
  padding:20px;
  background:
    linear-gradient(180deg, rgba(25,25,25,0.96), rgba(10,10,10,0.98));
  backdrop-filter:blur(26px);
  border-left:1px solid rgba(255,255,255,0.08);
  box-shadow:-10px 0 35px rgba(0,0,0,0.45);
  transition:0.35s ease;
  z-index:999;
  overflow:auto;
}

.cart.active{
  right:0;
}

.cart h3{
  margin-top:0;
  font-size:24px;
  color:#f3f3f3;
}

/* поля */
input{
  width:100%;
  padding:13px 14px;
  margin:8px 0;
  border:none;
  outline:none;
  border-radius:14px;
  color:#fff;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.06);
  box-sizing:border-box;
}

input::placeholder{
  color:#bdbdbd;
}

/* кнопки */
button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:14px;
  font-weight:600;
  color:#fff;
  background:
    linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:
    0 8px 25px rgba(0,0,0,0.35),
    inset 0 1px 0 rgba(255,255,255,0.08);
}

.footer{
  text-align:center;
  padding:26px 20px 30px;
  color:#a8a8a8;
  line-height:1.8;
  border-top:1px solid rgba(255,255,255,0.08);
  margin-top:20px;
}
</style><!DOCTYPE html>
