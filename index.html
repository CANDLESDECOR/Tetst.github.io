<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANDLES HOME</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
}

/* заголовок */
h1{
padding:20px;
}

/* баннер */
.banner{
height:200px;
background:url('https://images.unsplash.com/photo-1603006905003-be475563bc59') center/cover;
margin:10px;
border-radius:20px;
}

/* сетка */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

/* карточки */
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-radius:20px;
padding:10px;
text-align:center;
cursor:pointer;
}

.card img{
width:100%;
height:100px;
object-fit:cover;
border-radius:12px;
}

/* кнопка корзины */
.cart-btn{
position:fixed;
top:20px;
right:20px;
width:55px;
height:55px;
border-radius:50%;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(25px);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
z-index:1000;
cursor:pointer;
}

/* overlay */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
opacity:0;
pointer-events:none;
transition:0.3s;
z-index:998;
}

.overlay.active{
opacity:1;
pointer-events:auto;
}

/* корзина */
.cart{
position:fixed;
top:0;
right:-100%;
width:80%;
height:100%;
background:rgba(0,0,0,0.95);
backdrop-filter:blur(25px);
transition:0.4s;
padding:20px;
z-index:999;
overflow:auto;
}

.cart.active{
right:0;
}

input{
width:100%;
padding:12px;
margin:5px 0;
border-radius:10px;
border:none;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-weight:600;
cursor:pointer;
}
</style>

</head>

<body>

<div id="home">

<h1>CANDLES HOME</h1>

<div class="banner"></div>

<div class="grid">

<div class="card" onclick="openPage('loft')">
<img src="https://images.unsplash.com/photo-1602524816722-3a0f6fba9c01">
<div>Loft</div>
</div>

<div class="card" onclick="openPage('classic')">
<img src="https://images.unsplash.com/photo-1616628182506-1f3f954ed7be">
<div>Classic</div>
</div>

<div class="card" onclick="openPage('dessert')">
<img src="https://images.unsplash.com/photo-1602874801006-e26f3c1d0c92">
<div>Десертні</div>
</div>

<div class="card" onclick="openPage('kashpo')">
<img src="https://images.unsplash.com/photo-1616627454026-48c58c2c299c">
<div>Кашпо</div>
</div>

</div>

</div>

<!-- страницы -->
<div id="loft" style="display:none;padding:20px;">
<button onclick="back()">← Назад</button>
<h2>Loft</h2>
<button onclick="addToCart('Loft')">Додати</button>
</div>

<div id="classic" style="display:none;padding:20px;">
<button onclick="back()">← Назад</button>
<h2>Classic</h2>
<button onclick="addToCart('Classic')">Додати</button>
</div>

<div id="dessert" style="display:none;padding:20px;">
<button onclick="back()">← Назад</button>
<h2>Десертні</h2>
<button onclick="addToCart('Dessert')">Додати</button>
</div>

<div id="kashpo" style="display:none;padding:20px;">
<button onclick="back()">← Назад</button>
<h2>Кашпо</h2>
<button onclick="addToCart('Kashpo')">Додати</button>
</div>

<!-- кнопка -->
<div class="cart-btn" onclick="toggleCart()">🛒</div>

<!-- overlay -->
<div class="overlay" onclick="toggleCart()"></div>

<!-- корзина -->
<div class="cart">
<h3>Кошик</h3>
<div id="cart-items">Кошик порожній</div>

<input id="name" placeholder="Ім'я">
<input id="phone" placeholder="Телефон">

<button onclick="order()">Замовити</button>
</div>

<script>

let cart = [];
let product = "";

function addToCart(name){
  cart.push(name);
  product = cart.join(", ");
  updateCart();
}

function updateCart(){
  const el = document.getElementById("cart-items");
  if(cart.length === 0){
    el.innerHTML = "Кошик порожній";
  }else{
    el.innerHTML = cart.map(i => "• " + i).join("<br>");
  }
}

function toggleCart(){
  document.querySelector('.cart').classList.toggle('active');
  document.querySelector('.overlay').classList.toggle('active');
}

function addToCart(item){
cart.push(item);
document.getElementById("cart-items").innerHTML = cart.join("<br>");
}

function order(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
  
if(cart.length === 0){
  alert("Додай товар");
  return;
}
if(!name || !phone){
alert("Заповни дані");
return;
}

let text =
"Замовлення:\n" +
cart.join(", ") +
"\nІм'я: " + name +
"\nТелефон: " + phone;

const url =
"https://api.telegram.org/bot8706193551:AAEyRssAkXNJt7gp6Nh45ArL7DKAJTEKhFA/sendMessage?chat_id=862977657&text="
+ encodeURIComponent(text);

fetch(url)
.then(res => res.json())
.then(data => {
  
if(data.ok){
alert("Заявка відправлена 🔥");
}else{
alert("Помилка: " + data.description);
}
})
.catch(()=>{
alert("Помилка мережі");
});

}

</script>

</body>
</html>
