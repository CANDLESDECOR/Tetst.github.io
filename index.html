<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<style>
body{
font-family:-apple-system;
background:#000;
color:#fff;
padding:20px;
margin:0;
}

a{
color:#fff;
text-decoration:none;
opacity:.7;
}

img{
width:100%;
border-radius:20px;
margin:15px 0;
display:block;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:14px;
background:#fff;
color:#000;
margin-top:10px;
font-weight:600;
cursor:pointer;
}

.cart{
position:fixed;
bottom:10px;
left:10px;
right:10px;
background:#111;
padding:12px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

input{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-top:8px;
box-sizing:border-box;
font-size:16px;
}

#cartItems{
margin-bottom:10px;
line-height:1.5;
font-size:14px;
opacity:.9;
}

.small{
opacity:.6;
font-size:14px;
line-height:1.5;
}
</style>
</head>

<body>

<a href="javascript:history.back()">← Назад</a>

<img id="img" alt="product image">

<h1 id="title"></h1>

<p class="small">
Преміальний виріб ручної роботи. Мінімалізм, стиль та атмосфера.
</p>

<button onclick="addToCart()">Додати в кошик</button>

<div class="cart">
  <div id="cartItems"></div>

  <input id="name" placeholder="Ім'я">
  <input id="phone" placeholder="Телефон">

  <button onclick="sendOrder()">Замовити</button>
  <button onclick="clearCart()">Очистити кошик</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const params = new URLSearchParams(location.search);
const title = params.get("title");
const img = params.get("img");

document.getElementById("title").innerText = title || "";
document.getElementById("img").src = img || "";

function addToCart(){
  if(title){
    cart.push(title);
    localStorage.setItem("cart", JSON.stringify(cart));
    render();
  }
}

function render(){
  let html = "";
  if(cart.length === 0){
    html = "Кошик порожній";
  } else {
    cart.forEach(i => html += i + "<br>");
  }
  document.getElementById("cartItems").innerHTML = html;
}

function clearCart(){
  cart = [];
  localStorage.removeItem("cart");
  render();
}

function sendOrder(){
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();

  if(cart.length === 0){
    alert("Додайте товар у кошик");
    return;
  }

  if(!name || !phone){
    alert("Введіть ім'я і телефон");
    return;
  }

  let text = "🛒 Нове замовлення:\n\n";

  cart.forEach(item => {
    text += "• " + item + "\n";
  });

  text += "\n👤 Ім'я: " + name;
  text += "\n📞 Телефон: " + phone;

  fetch("https://api.telegram.org/bot8706193551:AAELif4O7facDZT6JKYQGRpqx5kBsJ3CkyE/sendMessage", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      chat_id: "862977657",
      text: text
    })
  })
  .then(response => response.json())
  .then(data => {
    if(data.ok){
      alert("Замовлення відправлено");
      clearCart();
      document.getElementById("name").value = "";
      document.getElementById("phone").value = "";
    } else {
      alert("Помилка: " + data.description);
    }
  })
  .catch(() => {
    alert("Помилка відправки");
  });
}

render();
</script>

</body>
</html>
