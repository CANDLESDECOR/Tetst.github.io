<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANDLES HOME</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  color:#111;
}

h1{
  padding:20px;
  margin:0;
  font-weight:700;
}

.cart-btn{
  position:fixed;
  top:20px;
  right:20px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  cursor:pointer;
}

/* ПРОМО */
.slider{
  overflow:hidden;
  margin:15px;
}
.slides{
  display:flex;
  gap:10px;
  animation:scroll 20s linear infinite;
}
.slide{
  min-width:260px;
  height:140px;
  border-radius:20px;
  overflow:hidden;
}
.slide img{
  width:100%;
  height:100%;
  object-fit:cover;
}
@keyframes scroll{
  0%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}

/* КАТЕГОРИИ */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}
.card{
  position:relative;
  height:120px;
  border-radius:20px;
  overflow:hidden;
}
.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.card span{
  position:absolute;
  bottom:10px;
  left:10px;
  color:#fff;
  font-weight:700;
  text-shadow:0 2px 5px rgba(0,0,0,0.7);
}

.footer{
  text-align:center;
  padding:20px;
  color:#666;
}
</style>
</head>

<body>

<h1>CANDLES HOME</h1>

<div class="cart-btn">🛒</div>

<!-- ПРОМО -->
<div class="slider">
  <div class="slides">
    <div class="slide"><img src="https://images.unsplash.com/photo-1603006905003-be475563bc59"></div>
    <div class="slide"><img src="https://images.unsplash.com/photo-1596461404969-9ae70f2830c1"></div>
    <div class="slide"><img src="https://images.unsplash.com/photo-1607082349566-187342175e2f"></div>

    <div class="slide"><img src="https://images.unsplash.com/photo-1603006905003-be475563bc59"></div>
    <div class="slide"><img src="https://images.unsplash.com/photo-1596461404969-9ae70f2830c1"></div>
    <div class="slide"><img src="https://images.unsplash.com/photo-1607082349566-187342175e2f"></div>
  </div>
</div>

<!-- КАТЕГОРИИ -->
<div class="grid">

<a href="classic.html" class="card">
<img src="https://images.unsplash.com/photo-1603006905003-be475563bc59">
<span>Classic</span>
</a>

<a href="loft.html" class="card">
<img src="https://images.unsplash.com/photo-1596461404969-9ae70f2830c1">
<span>Loft</span>
</a>

<a href="dessert.html" class="card">
<img src="https://images.unsplash.com/photo-1607082349566-187342175e2f">
<span>Десертні</span>
</a>

<a href="kashpo.html" class="card">
<img src="https://images.unsplash.com/photo-1598300053653-3c6b0d9e0c6d">
<span>Кашпо</span>
</a>

</div>

<div class="footer">
Instagram: candleshome.store<br>
Telegram: Candles_Home_Catalog
</div>

</body>
</html>
