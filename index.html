<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CANDLES HOME</title>
  <style>
    :root{
      --bg:#0b0b0f;
      --card:rgba(255,255,255,.08);
      --card-2:rgba(255,255,255,.06);
      --stroke:rgba(255,255,255,.10);
      --text:#f5f5f7;
      --muted:#a1a1aa;
      --accent:#ffffff;
      --shadow:0 20px 60px rgba(0,0,0,.45);
      --radius:24px;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;background:radial-gradient(1200px 700px at 50% -10%, #1a1a22 0%, var(--bg) 45%, #050507 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Inter,system-ui,sans-serif}
    body{min-height:100vh;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}

    .app{
      max-width:460px;
      margin:0 auto;
      min-height:100vh;
      position:relative;
      overflow:hidden;
    }

    .noise{
      position:fixed; inset:0; pointer-events:none; opacity:.04;
      background-image:
        radial-gradient(circle at 20% 20%, #fff 0 1px, transparent 1px),
        radial-gradient(circle at 80% 30%, #fff 0 1px, transparent 1px),
        radial-gradient(circle at 40% 70%, #fff 0 1px, transparent 1px);
      background-size: 120px 120px, 180px 180px, 240px 240px;
    }

    .topbar{
      position:sticky; top:0; z-index:20;
      padding:14px 16px 12px;
      backdrop-filter: blur(18px);
      background:linear-gradient(to bottom, rgba(10,10,14,.82), rgba(10,10,14,.35), transparent);
    }

    .status{
      display:flex; justify-content:space-between; align-items:center;
      font-size:13px; color:#fff; opacity:.9; margin-bottom:10px;
    }

    .title{
      display:flex; align-items:flex-end; justify-content:space-between; gap:12px;
    }

    .title h1{
      margin:0; font-size:30px; line-height:1.02; letter-spacing:-.03em; font-weight:700;
    }

    .title p{
      margin:0; color:var(--muted); font-size:13px; text-align:right;
    }

    .hero{
      margin:8px 16px 18px;
      padding:14px;
      border-radius:30px;
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      border:1px solid rgba(255,255,255,.10);
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
      animation:fadeUp .55s ease both;
    }

    .hero-image{
      width:100%;
      aspect-ratio: 1 / 1.08;
      object-fit:cover;
      border-radius:22px;
      display:block;
      background:#111;
    }

    .hero-meta{
      padding:14px 6px 6px;
    }

    .badge{
      display:inline-flex; align-items:center; gap:6px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      font-size:12px; color:#fff; opacity:.95;
      margin-bottom:10px;
    }

    .hero h2{
      margin:0 0 8px;
      font-size:26px; letter-spacing:-.03em; line-height:1.05;
    }

    .hero .sub{
      margin:0 0 14px; color:var(--muted); font-size:14px; line-height:1.45;
    }

    .cta-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .cta{
      display:flex; align-items:center; justify-content:center;
      min-height:52px;
      padding:12px 14px;
      border-radius:18px;
      text-decoration:none;
      font-weight:600; font-size:15px;
      transition:.18s ease;
      border:1px solid rgba(255,255,255,.10);
    }

    .cta:active{transform:scale(.985)}
    .cta.primary{
      background:#fff; color:#000;
      box-shadow:0 10px 30px rgba(255,255,255,.12);
    }
    .cta.secondary{
      background:rgba(255,255,255,.06); color:#fff;
      backdrop-filter:blur(18px);
    }

    .chips{
      display:flex; gap:10px; overflow:auto; padding:0 16px 8px;
      scrollbar-width:none;
    }
    .chips::-webkit-scrollbar{display:none}
    .chip{
      flex:0 0 auto;
      padding:12px 16px;
      border-radius:18px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:#d4d4d8;
      font-size:14px;
      cursor:pointer;
      transition:.2s ease;
      user-select:none;
    }
    .chip.active{
      background:#fff;
      color:#000;
      box-shadow:0 12px 28px rgba(255,255,255,.12);
    }

    .section{
      padding:8px 16px 110px;
      animation:fadeUp .45s ease both;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .card{
      border-radius:24px;
      overflow:hidden;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
      backdrop-filter:blur(16px);
      transition:.2s ease;
      cursor:pointer;
    }
    .card:active{transform:scale(.985)}
    .card img{
      width:100%;
      aspect-ratio:1 / 1.12;
      object-fit:cover;
      display:block;
      background:#111;
    }
    .card-body{
      padding:12px 12px 14px;
    }
    .card-title{
      margin:0 0 6px;
      font-size:15px;
      line-height:1.18;
      letter-spacing:-.02em;
      font-weight:600;
    }
    .card-desc{
      margin:0;
      color:var(--muted);
      font-size:12px;
      line-height:1.35;
      min-height:32px;
    }

    .bottom-bar{
      position:fixed;
      left:50%; transform:translateX(-50%);
      bottom:calc(10px + env(safe-area-inset-bottom));
      width:min(430px, calc(100% - 20px));
      z-index:30;
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      padding:10px;
      border-radius:24px;
      background:rgba(18,18,24,.72);
      backdrop-filter:blur(24px);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 20px 50px rgba(0,0,0,.45);
    }

    .search{
      display:flex; align-items:center; gap:10px;
      padding:0 14px;
      min-height:52px;
      border-radius:18px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.06);
    }
    .search input{
      flex:1;
      background:transparent;
      border:none;
      outline:none;
      color:#fff;
      font-size:15px;
    }
    .search input::placeholder{color:#8e8e93}

    .cart-btn{
      min-width:52px;
      min-height:52px;
      border:none;
      border-radius:18px;
      background:#fff;
      color:#000;
      font-weight:700;
      font-size:16px;
      cursor:pointer;
    }

    .sheet,
    .product-sheet{
      position:fixed; inset:0;
      background:rgba(0,0,0,.48);
      backdrop-filter:blur(10px);
      z-index:50;
      display:none;
      align-items:flex-end;
      animation:fade .22s ease;
    }
    .sheet.active,
    .product-sheet.active{display:flex}

    .sheet-panel,
    .product-panel{
      width:100%;
      max-width:460px;
      margin:0 auto;
      background:#0f0f14;
      border-top-left-radius:28px;
      border-top-right-radius:28px;
      border:1px solid rgba(255,255,255,.08);
      padding:14px 16px calc(18px + env(safe-area-inset-bottom));
      box-shadow:0 -20px 60px rgba(0,0,0,.5);
      animation:slideUp .28s ease;
      max-height:90vh;
      overflow:auto;
    }

    .handle{
      width:42px; height:5px; border-radius:999px;
      background:rgba(255,255,255,.18);
      margin:0 auto 14px;
    }

    .sheet-head{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      margin-bottom:12px;
    }
    .sheet-head h3{
      margin:0; font-size:22px; letter-spacing:-.03em;
    }
    .close{
      border:none; background:rgba(255,255,255,.08); color:#fff;
      width:36px; height:36px; border-radius:12px; cursor:pointer;
    }

    .cart-item{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:12px 0;
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .cart-item-title{font-size:14px}
    .cart-remove{
      border:none; background:none; color:#8e8e93; cursor:pointer;
      font-size:13px;
    }

    .form{
      margin-top:14px;
      display:grid; gap:10px;
    }
    .input{
      min-height:52px;
      padding:0 14px;
      border-radius:18px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.06);
      color:#fff;
      font-size:15px;
      outline:none;
    }
    .submit{
      min-height:52px;
      border:none;
      border-radius:18px;
      background:#fff;
      color:#000;
      font-weight:700;
      font-size:15px;
      cursor:pointer;
    }

    .note{
      margin-top:10px;
      text-align:center;
      color:#8e8e93;
      font-size:12px;
      line-height:1.4;
    }

    .product-image{
      width:100%;
      aspect-ratio:1 / 1.05;
      object-fit:cover;
      border-radius:22px;
      background:#111;
      display:block;
      margin-bottom:14px;
    }
    .product-panel h2{
      margin:0 0 8px;
      font-size:28px;
      letter-spacing:-.04em;
      line-height:1.03;
    }
    .product-panel p{
      margin:0 0 16px;
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }
    .product-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    @keyframes fadeUp{
      from{opacity:0; transform:translateY(16px)}
      to{opacity:1; transform:translateY(0)}
    }
    @keyframes slideUp{
      from{transform:translateY(100%)}
      to{transform:translateY(0)}
    }
    @keyframes fade{
      from{opacity:0}
      to{opacity:1}
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <div class="app">
    <div class="topbar">
      <div class="status">
        <span>9:41</span>
        <span>Candles Home</span>
      </div>

      <div class="title">
        <h1>Catalog</h1>
        <p>Minimal objects<br>for atmosphere</p>
      </div>
    </div>

    <section class="hero">
      <img src="3.jpg" alt="Featured candle" class="hero-image">
      <div class="hero-meta">
        <div class="badge">New collection</div>
        <h2>Dessert line</h2>
        <p class="sub">Soft visual language, deep atmosphere, premium presentation.</p>
        <div class="cta-row">
          <button class="cta primary" onclick="openCategory('dessert')">Open</button>
          <button class="cta secondary" onclick="openCart()">Cart</button>
        </div>
      </div>
    </section>

    <div class="chips" id="chips"></div>

    <section class="section">
      <div class="grid" id="grid"></div>
    </section>
  </div>

  <!-- PRODUCT SHEET -->
  <div class="product-sheet" id="productSheet" onclick="if(event.target===this) closeProduct()">
    <div class="product-panel">
      <div class="handle"></div>
      <div class="sheet-head">
        <h3>Product</h3>
        <button class="close" onclick="closeProduct()">✕</button>
      </div>
      <img id="productImage" class="product-image" alt="">
      <h2 id="productTitle"></h2>
      <p id="productDesc"></p>
      <div class="product-actions">
        <button class="cta primary" id="productAddBtn">Add to cart</button>
        <button class="cta secondary" onclick="closeProduct()">Back</button>
      </div>
    </div>
  </div>

  <!-- CART SHEET -->
  <div class="sheet" id="cartSheet" onclick="if(event.target===this) closeCart()">
    <div class="sheet-panel">
      <div class="handle"></div>
      <div class="sheet-head">
        <h3>Order</h3>
        <button class="close" onclick="closeCart()">✕</button>
      </div>

      <div id="cartItems"></div>

      <div class="form">
        <input class="input" id="name" placeholder="Ім'я">
        <input class="input" id="phone" placeholder="Телефон">
        <button class="submit" onclick="submitOrder()">Оформити</button>
      </div>

      <div class="note">Після оформлення замовлення ми зв’яжемося з вами для уточнення деталей.</div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="search">
      <span>⌕</span>
      <input id="search" placeholder="Search" oninput="renderGrid()">
    </div>
    <button class="cart-btn" onclick="openCart()">🛍</button>
  </div>

  <script>
    const categories = [
      {id:'all', title:'All'},
      {id:'classic', title:'Classic'},
      {id:'loft', title:'Loft'},
      {id:'kashpo', title:'Kashpo'},
      {id:'dessert', title:'Dessert'}
    ];

    const products = [
      {id:1, title:'Classic One', category:'classic', img:'1.jpg', desc:'Minimal, calm, balanced object for a clean interior.'},
      {id:2, title:'Loft Form', category:'loft', img:'2.jpg', desc:'Architectural silhouette with restrained visual character.'},
      {id:3, title:'Kashpo Object', category:'kashpo', img:'3.jpg', desc:'Textural object with soft volume and premium presence.'},
      {id:4, title:'Dessert Candle', category:'dessert', img:'4.jpg', desc:'Expressive visual composition with soft, atmospheric look.'}
    ];

    let currentCategory = 'all';
    let cart = [];
    let currentProduct = null;

    const chips = document.getElementById('chips');
    const grid = document.getElementById('grid');
    const search = document.getElementById('search');

    function renderChips(){
      chips.innerHTML = '';
      categories.forEach(cat=>{
        const el = document.createElement('div');
        el.className = 'chip' + (cat.id === currentCategory ? ' active' : '');
        el.textContent = cat.title;
        el.onclick = ()=> openCategory(cat.id);
        chips.appendChild(el);
      });
    }

    function openCategory(cat){
      currentCategory = cat;
      renderChips();
      renderGrid();
      window.scrollTo({top:0, behavior:'smooth'});
    }

    function renderGrid(){
      const q = search.value.trim().toLowerCase();

      const filtered = products.filter(p=>{
        const byCategory = currentCategory === 'all' || p.category === currentCategory;
        const bySearch = !q || p.title.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q);
        return byCategory && bySearch;
      });

      grid.innerHTML = '';
      filtered.forEach(p=>{
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <img src="${p.img}" alt="${p.title}">
          <div class="card-body">
            <h3 class="card-title">${p.title}</h3>
            <p class="card-desc">${p.desc}</p>
          </div>
        `;
        card.onclick = ()=> openProduct(p.id);
        grid.appendChild(card);
      });
    }

    function openProduct(id){
      currentProduct = products.find(p=>p.id===id);
      if(!currentProduct) return;

      document.getElementById('productTitle').textContent = currentProduct.title;
      document.getElementById('productDesc').textContent = currentProduct.desc;
      document.getElementById('productImage').src = currentProduct.img;
      document.getElementById('productAddBtn').onclick = ()=> {
        addToCart(currentProduct.title);
        closeProduct();
        openCart();
      };

      document.getElementById('productSheet').classList.add('active');
    }

    function closeProduct(){
      document.getElementById('productSheet').classList.remove('active');
    }

    function addToCart(title){
      cart.push({title});
      renderCart();
    }

    function renderCart(){
      const box = document.getElementById('cartItems');
      if(!cart.length){
        box.innerHTML = '<div style="color:#8e8e93; padding:8px 0 4px;">Кошик порожній</div>';
        return;
      }

      box.innerHTML = cart.map((item, i)=>`
        <div class="cart-item">
          <div class="cart-item-title">${item.title}</div>
          <button class="cart-remove" onclick="removeItem(${i})">Видалити</button>
        </div>
      `).join('');
    }

    function removeItem(i){
      cart.splice(i,1);
      renderCart();
    }

    function openCart(){
      renderCart();
      document.getElementById('cartSheet').classList.add('active');
    }

    function closeCart(){
      document.getElementById('cartSheet').classList.remove('active');
    }

    function submitOrder(){
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();

      if(!cart.length){
        alert('Додайте товар');
        return;
      }
      if(!name || !phone){
        alert("Введіть ім'я і телефон");
        return;
      }

      alert('Замовлення оформлено');
      cart = [];
      document.getElementById('name').value = '';
      document.getElementById('phone').value = '';
      renderCart();
      closeCart();
    }

    renderChips();
    renderGrid();
  </script>
</body>
</html>
