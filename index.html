<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANDLES HOME</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f5f5;
  color:#111;
}

/* заголовок */
h1{
  padding:20px;
  margin:0;
  font-weight:700;
}

/* кнопка корзины */
.cart-btn{
  position:fixed;
  top:20px;
  right:20px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* категории */
.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
  padding:15px;
}

.card{
  padding:20px;
  border-radius:20px;
  background:#fff;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  cursor:pointer;
}

.card:active{ background:#ddd; }

.card small{
  display:block;
  color:#777;
  margin-top:5px;
}

/* товары */
.products{
  padding:15px;
  display:none;
  flex-direction:column;
  gap:10px;
}

.product{
  background:#fff;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.product button{
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#111;
  color:#fff;
}

/* корзина */
.cart{
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  height:70%;
  background:#fff;
  padding:20px;
  border-radius:20px 20px 0 0;
  transition:0.3s;
  box-shadow:0 -5px 20px rgba(0,0,0,0.2);
  overflow:auto;
}

.cart.active{ bottom:0; }

.close{
  position:absolute;
  top:15px;
  right:20px;
  font-size:20px;
  cursor:pointer;
}

.cart-item{
  margin-bottom:10px;
}

.cart input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

.cart button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#111;
  color:#fff;
}

/* футер */
.footer{
  text-align:center;
  padding:20px;
  color:#777;
}
</style>
</head>

<body>

<h1>CANDLES HOME</h1>

<div class="cart-btn" onclick="toggleCart()">🛒</div>

<!-- категории -->
<div class="grid">

  <div class="card" onclick="openCategory('classic')">
    Classic
    <small>Класичні свічки</small>
  </div>

  <div class="card" onclick="openCategory('loft')">
    Loft
    <small>Мінімал стиль</small>
  </div>

  <div class="card" onclick="openCategory('dessert')">
    Десертні
    <small>Як справжні десерти</small>
  </div>

  <div class="card" onclick="openCategory('kashpo')">
    Кашпо
    <small>Декор</small>
  </div>

</div>

<!-- товары -->
<div id="products" class="products"></div>

<!-- корзина -->
<div class="cart">
  <div class="close" onclick="toggleCart()">✖</div>

  <h3>Кошик</h3>

  <div id="cart-items">Порожньо</div>
  <div id="total"></div>

  <input id="name" placeholder="Ваше ім’я">
  <input id="phone" placeholder="Телефон">

  <button onclick="order()">Замовити</button>
</div>

<!-- футер -->
<div class="footer">
  Instagram: candleshome.store<br>
  Telegram: Candles_Home_Catalog
</div>

<script>
let cart = [];

const data = {
  classic: [
    {name:"Classic біла", price:150},
    {name:"Classic чорна", price:180}
  ],
  loft: [
    {name:"Loft бетон", price:250},
    {name:"Loft чорна", price:230}
  ],
  dessert: [
    {name:"Свічка торт", price:300},
    {name:"Свічка клубника", price:280}
  ],
  kashpo: [
    {name:"Кашпо біле", price:200},
    {name:"Кашпо чорне", price:220}
  ]
};

function openCategory(cat){
  let block = document.getElementById("products");
  block.style.display = "flex";
  block.innerHTML = "";

  data[cat].forEach(p=>{
    block.innerHTML += `
      <div class="product">
        <b>${p.name}</b><br>
        ${p.price} грн
        <button onclick="addToCart('${p.name}',${p.price})">В кошик</button>
      </div>
    `;
  });
}

function addToCart(name, price){
  cart.push({name, price});
  renderCart();
}

function renderCart(){
  let list = document.getElementById("cart-items");
  let total = 0;
  list.innerHTML = "";

  cart.forEach((item,i)=>{
    total += item.price;
    list.innerHTML += `
      <div class="cart-item">
        ${item.name} - ${item.price} грн
        <button onclick="removeItem(${i})">❌</button>
      </div>
    `;
  });

  document.getElementById("total").innerHTML = "<b>Разом: "+total+" грн</b>";

  if(cart.length===0){
    list.innerHTML = "Порожньо";
    document.getElementById("total").innerHTML = "";
  }
}

function removeItem(i){
  cart.splice(i,1);
  renderCart();
}

function toggleCart(){
  document.querySelector(".cart").classList.toggle("active");
}

function order(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;

  let text = "Замовлення\n👤 "+name+"\n📞 "+phone+"\n\n";

  cart.forEach(item=>{
    text += item.name+" - "+item.price+" грн\n";
  });

  fetch("https://api.telegram.org/botВАШ_ТОКЕН/sendMessage", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      chat_id:"ВАШ_ID",
      text:text
    })
  });

  alert("Замовлення відправлено");
}
</script>

</body>
</html>
