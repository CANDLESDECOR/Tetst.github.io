<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANDLES HOME</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
}

/* заголовок */
h1{
  text-align:center;
  padding:20px;
  letter-spacing:2px;
}

/* СЛАЙДЕР */
.slider{
  overflow:hidden;
  margin:10px;
  border-radius:20px;
}

.slides{
  display:flex;
  gap:10px;
  width:max-content;
  animation:scroll 25s linear infinite;
}

.slide{
  min-width:280px;
  height:160px;
  border-radius:20px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}

/* бесконечная прокрутка */
@keyframes scroll{
  0%{transform:translateX(0);}
  100%{transform:translateX(-50%);}
}

/* карточки */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:20px;
  text-align:center;
  cursor:pointer;
}

/* корзина */
.cart-btn{
  position:fixed;
  top:20px;
  right:20px;
  background:#222;
  width:50px;
  height:50px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

.cart{
  position:fixed;
  right:-100%;
  top:0;
  width:80%;
  height:100%;
  background:#111;
  padding:20px;
  transition:0.3s;
}

.cart.active{
  right:0;
}

.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  opacity:0;
  pointer-events:none;
}

.overlay.active{
  opacity:1;
  pointer-events:auto;
}
  .card{
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  color:#fff;
  }

/* футер */
.footer{
  text-align:center;
  padding:20px;
  color:#aaa;
}
</style>
</head>

<body>

<h1>CANDLES HOME</h1>

<!-- БАННЕРЫ -->
<div class="slider">
  <div class="slides">

    <div class="slide">Promo1</div>
    <div class="slide">Promo2</div>
    <div class="slide">Promo3</div>
    <div class="slide">Promo4</div>

    <!-- дублируем для бесконечности -->
    <div class="slide">Promo1</div>
    <div class="slide">Promo2</div>
    <div class="slide">Promo3</div>
    <div class="slide">Promo4</div>

  </div>
</div>

<!-- КАТЕГОРИИ -->
<div class="grid">

  <a href="classic.html" class="card">Classic</a>

  <a href="loft.html" class="card">Loft</a>

  <a href="dessert.html" class="card">Десертні</a>

  <a href="kashpo.html" class="card">Кашпо</a>

</div>

<!-- КОРЗИНА -->
<div class="cart-btn" onclick="toggleCart()">🛒</div>

<div class="overlay" onclick="toggleCart()"></div>

<div class="cart">
  <h3>Кошик</h3>
  <div id="cart-items">Порожньо</div>

  <input id="name" placeholder="Ім'я">
  <input id="phone" placeholder="Телефон">

  <button onclick="order()">Замовити</button>
</div>

<!-- ФУТЕР -->
<div class="footer">
  Instagram: candleshome.store<br>
  Telegram: Candles_Home_Catalog
</div>

<script>
let cart = [];

function toggleCart(){
  document.querySelector(".cart").classList.toggle("active");
  document.querySelector(".overlay").classList.toggle("active");
}

function order(){
let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;

if(!name || !phone){
alert("Заповни дані");
return;
}

let text = "Замовлення:\n" + name + "\n" + phone;

let url = "https://api.telegram.org/bot8309821481:AAFJUBalSpC1njbBzzyPu1yNet99zS3SHBU/sendMessage?chat_id=862977657&text=" + encodeURIComponent(text);

window.open(url);
}
</script>

</body>
</html>
