<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANDLES HOME</title>

<style>
body{
margin:0;
font-family:-apple-system;
background:#000;
color:#fff;
}

/* заголовок */
h1{
padding:20px;
margin:0;
}

/* баннер */
.banner{
height:180px;
margin:10px;
border-radius:20px;
background:url('https://images.unsplash.com/photo-1603006905003-be475563bc59') center/cover;
}

/* сетка */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:20px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:12px;
}

.card button{
margin-top:10px;
width:100%;
padding:10px;
border:none;
border-radius:12px;
font-weight:600;
}

/* кнопка корзины */
.cart-btn{
position:fixed;
top:20px;
right:20px;
width:55px;
height:55px;
border-radius:50%;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(25px);
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
z-index:999;
}

/* overlay */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(5px);
opacity:0;
pointer-events:none;
transition:0.3s;
z-index:900;
}

.overlay.active{
opacity:1;
pointer-events:auto;
}

/* корзина */
.cart{
position:fixed;
right:-100%;
top:0;
width:85%;
height:100%;
background:rgba(0,0,0,0.95);
backdrop-filter:blur(25px);
transition:0.4s;
padding:20px;
z-index:1000;
}

.cart.active{
right:0;
}

input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:none;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-weight:600;
}

.remove{
background:red;
color:#fff;
margin-top:5px;
}
</style>
</head>

<body>

<h1>CANDLES HOME</h1>

<div class="cart-btn" onclick="toggleCart()">🛒</div>

<div class="banner"></div>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1602524816722-3a0f6fba9c01">
Loft
<button onclick="addToCart('Loft')">Додати</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1616628182506-1f3f954ed7be">
Classic
<button onclick="addToCart('Classic')">Додати</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1602874801006-e26f3c1d0c92">
Десертні
<button onclick="addToCart('Десертні')">Додати</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1616627454026-48c58c2c299c">
Кашпо
<button onclick="addToCart('Кашпо')">Додати</button>
</div>

</div>

<div class="overlay" onclick="toggleCart()"></div>

<div class="cart">
<div style="text-align:right; font-size:24px; cursor:pointer;" onclick="toggleCart()">✕</div>

<h3>Кошик</h3>
<div id="cart-items">Кошик порожній</div>

<input id="name" placeholder="Ім'я">
<input id="phone" placeholder="Телефон">

<button onclick="order()">Замовити</button>
</div>

<script>
let cart = [];

function toggleCart(){
document.querySelector('.cart').classList.toggle('active');
document.querySelector('.overlay').classList.toggle('active');
}

function addToCart(name){
cart.push(name);
renderCart();
}

function renderCart(){
let el = document.getElementById("cart-items");

if(cart.length === 0){
el.innerHTML = "Кошик порожній";
return;
}

el.innerHTML = cart.map((item,i)=>`
<div>
${item}
<button class="remove" onclick="removeItem(${i})">✕</button>
</div>
`).join("");
}

function removeItem(i){
cart.splice(i,1);
renderCart();
}

function order(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;

if(!name || !phone){
alert("Заповни дані");
return;
}

let text = `НОВЕ ЗАМОВЛЕННЯ
Ім'я: ${name}
Телефон: ${phone}
Товари: ${cart.join(", ")}`;

let url = "https://api.telegram.org/bot8706193551:AAEyRssAkXNJt7gp6Nh45ArL7DKAJTEKhFA"/sendMessage?chat_id=8706193551&text= + encodeURIComponent(text);

window.open(url, "_blank");

alert("Заявка відправлена");

cart = [];
renderCart();
}
</script>

</body>
</html>
