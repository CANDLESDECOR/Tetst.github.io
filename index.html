<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANDLES HOME</title>

<style>
body{
    margin:0;
    font-family:Arial;
    color:#fff;
    background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05), transparent),
    radial-gradient(circle at 80% 30%, rgba(255,255,255,0.04), transparent),
    linear-gradient(135deg,#0d0d0d,#1a1a1a);
}

.title{
    text-align:center;
    font-size:36px;
    font-weight:900;
    margin:30px 0;
    background: linear-gradient(180deg,#fff,#aaa);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.glass{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(25px);
    border-radius:25px;
    border:1px solid rgba(255,255,255,0.1);
    padding:20px;
    margin:20px;
}

.slider{
    display:flex;
    gap:15px;
    overflow-x:auto;
}

.item{
    min-width:230px;
    padding:15px;
    border-radius:20px;
    background:rgba(255,255,255,0.06);
}

.item img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:15px;
    margin-bottom:10px;
}

.item.selected{
    box-shadow:0 0 25px rgba(255,255,255,0.4);
}

.btn{
    display:block;
    text-align:center;
    padding:12px;
    border-radius:20px;
    margin-top:10px;
    background:rgba(255,255,255,0.1);
}

input, select{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:15px;
    background:rgba(255,255,255,0.1);
    color:#fff;
}
</style>
</head>

<body>

<div class="title">CANDLES HOME</div>

<div class="glass">
<div class="slider">

<div class="item">
<img src="1.jpeg">
Коньячный бокал<br>
<s>400</s> 299 грн 🔥
<div class="btn" onclick="selectProduct(this,'Коньячный бокал')">Обрати</div>
</div>

<div class="item">
<img src="2.jpeg">
Свічка Кава<br>
<s>260</s> 159 грн 🔥
<div class="btn" onclick="selectProduct(this,'Свічка Кава')">Обрати</div>
</div>

<div class="item">
<img src="3.jpeg">
Десерт<br>
<s>320</s> 219 грн 🔥
<div class="btn" onclick="selectProduct(this,'Десерт')">Обрати</div>
</div>

<div class="item">
<img src="4.jpeg">
Свічка в кашпо<br>
<s>260</s> 159 грн 🔥
<div class="btn" onclick="selectProduct(this,'Свічка в кашпо')">Обрати</div>
</div>

<div class="item">
<img src="5.jpeg">
Кашпо + свічки<br>
<s>250</s> 149 грн 🔥
<div class="btn" onclick="selectProduct(this,'Кашпо + свічки')">Обрати</div>
</div>

<div class="item">
<img src="6.jpeg">
Бокал Шампань<br>
<s>300</s> 199 грн 🔥
<div class="btn" onclick="selectProduct(this,'Бокал Шампань')">Обрати</div>
</div>

</div>
</div>

<div class="glass">
<h2>Оформлення замовлення</h2>

<select id="product">
<option value="">Оберіть товар</option>
</select>

<input id="name" placeholder="Ваше ім’я">
<input id="phone" placeholder="Телефон">
<input id="city" placeholder="Місто НП">
<input id="post" placeholder="Відділення НП">

<div class="btn" onclick="sendOrder()">Замовити</div>
</div>

<script>
let selectedProduct="";

function selectProduct(btn,product){
selectedProduct=product;
document.getElementById("product").innerHTML =
"<option>"+product+"</option>";

document.querySelectorAll(".item").forEach(i=>i.classList.remove("selected"));
btn.parentElement.classList.add("selected");
}

function sendOrder(){
fetch("https://api.telegram.org/botТВОЙ_ТОКЕН/sendMessage",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id:"ТВОЙ_CHAT_ID",
text:"Замовлення: "+selectedProduct
})
});
alert("Заявка відправлена");
}
</script>

</body>
</html>
