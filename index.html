<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANDLES HOME</title>

 <style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  color:#111;
  background:linear-gradient(180deg,#f8f8f8,#eaeaea);
}

/* заголовок */
h1{
  letter-spacing:2px;
  font-weight:700;
  padding:20px;
  margin:0;
  color:#111;
}

/* слайдер */
.slider{
  overflow:hidden;
  margin:15px;
}

.slides{
  display:flex;
  gap:10px;
  animation:scroll 30s linear infinite;
}

.slide{
  min-width:260px;
  height:130px;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:20px;

  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(20px);

  border:1px solid rgba(0,0,0,0.05);

  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

@keyframes scroll{
  0%{transform:translateX(0);}
  100%{transform:translateX(-50%);}
}

/* категории */
.card{
  padding:20px;
  border-radius:20px;

  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(20px);

  border:1px solid rgba(0,0,0,0.05);

  box-shadow:0 10px 25px rgba(0,0,0,0.08);

  transition:0.2s;
}

.card:active{
  transform:scale(0.97);
}

.card-title{
  font-size:20px;
  font-weight:700;
  margin-bottom:5px;
}

.card-sub{
  font-size:13px;
  color:#777;
}ms:center;
  justify-content:center;

  font-size:22px;
  cursor:pointer;

  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  }

/* ссылки */
a{
  text-decoration:none;
  color:#111;
}

/* кнопка корзины */
.cart-btn{
  position:fixed;
  top:20px;
  right:20px;

  width:55px;
  height:55px;

  border-radius:50%;

  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(20px);

  display:flex;
  align-ite.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:15px;
  padding:15px;
}


/* корзина */
.cart{
  position:fixed;
  top:0;
  right:-100%;

  width:85%;
  height:100%;

  padding:20px;

  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(25px);

  transition:0.3s;
  z-index:1000;

  display:flex;
  flex-direction:column;
}

.cart.active{
  right:0;
}

/* крестик */
.close{
  position:absolute;
  top:20px;
  right:20px;

  font-size:22px;
  cursor:pointer;
}

/* список */
#cart-items{
  text-align:center;
  color:#777;
  margin-bottom:15px;
}

/* поля */
.cart input{
  width:100%;
  padding:14px;
  margin-bottom:10px;

  border-radius:14px;

  border:1px solid #ddd;
  background:#fff;

  color:#111;
}

/* кнопка */
.cart button{
  width:100%;
  padding:16px;

  border:none;
  border-radius:16px;

  background:#111;
  color:#fff;

  font-size:16px;
  font-weight:600;

  box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

/* футер */
.footer{
  text-align:center;
  padding:20px;
  color:#666;
}
  .close{
  position:absolute;
  top:20px;
  right:20px;

  font-size:20px;
  cursor:pointer;
  }
  .cart-btn:active{
  transform:scale(0.9);
  }
  a, .card{
  -webkit-tap-highlight-color: transparent;
  }
  .page{
  display:none;
  padding:20px;
}

.page.active{
  display:block;
}
</style>
  
</head>
<body>

<h1>CANDLES HOME</h1>

<!-- кнопка корзины -->
<div class="cart-btn" onclick="toggleCart()">🛒</div>

<!-- баннер -->
<div class="slider">
  <div class="slides">
    <div class="slide">Promo1</div>
    <div class="slide">Promo2</div>
    <div class="slide">Promo3</div>
    <div class="slide">Promo4</div>

    <div class="slide">Promo1</div>
    <div class="slide">Promo2</div>
    <div class="slide">Promo3</div>
    <div class="slide">Promo4</div>
  </div>
</div>

<!-- категории -->
<div class="card" onclick="openPage('classic')">
    <div class="card-title">Classic</div>
    <div class="card-sub">Класичні свічки</div>
  </div>

  <div class="card" onclick="openPage('loft')">
    <div class="card-title">Loft</div>
    <div class="card-sub">Мінімал стиль</div>
  </div>

  <div class="card" onclick="openPage('dessert')">
    <div class="card-title">Десертні</div>
    <div class="card-sub">Як справжні десерти</div>
  </div>

  <div class="card" onclick="openPage('kashpo')">
    <div class="card-title">Кашпо</div>
    <div class="card-sub">Декор та стиль</div>
  </div>

  </div>"phone" placeholder="Телефон">

  <button onclick="order()">Замовити</button>
</div>
 
<!-- корзина -->
  <div class="cart">
  <div class="cart-btn" onclick="toggleCart()">●</div>

  <h3>Кошик</h3>

  <div id="cart-items">Порожньо</div>

  <input id="name" placeholder="Ваше ім’я">
  <input id=<div class="grid">

  </div>
<!-- футер -->
<div class="footer">
  Instagram: candleshome.store<br>
  Telegram: Candles_Home_Catalog
</div>

<script>
 function openPage(id){
  document.querySelectorAll(".page").forEach(p=>{
    p.classList.remove("active");
  });

  document.getElementById(id).classList.add("active");
 }
function toggleCart(){
  document.querySelector(".cart").classList.toggle("active");
}

function order(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;

  let text = "🔥 Замовлення\n👤 " + name + "\n📞 " + phone;

  fetch("https://api.telegram.org/bot8309821481:AA.../sendMessage", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      chat_id:"862977657",
      text:text
    })
  });

  alert("Заявка відправлена 🔥");
}
</script>

</body>
</html>
