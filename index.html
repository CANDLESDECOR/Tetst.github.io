<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANDLES HOME</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
  color:#111;
}

/* заголовок */
h1{
  padding:20px;
  margin:0;
}

/* кнопка корзины */
.cart-btn{
  position:fixed;
  top:20px;
  right:20px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  cursor:pointer;
}

/* категории */
.grid{
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.card{
  background:#fff;
  border-radius:20px;
  padding:20px;
  font-weight:600;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* товары */
.products{
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.product{
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.product img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.info{
  padding:15px;
}

.bottom{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.btn{
  background:#111;
  color:#fff;
  border:none;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
}

/* корзина */
.cart{
  position:fixed;
  top:0;
  right:-100%;
  width:85%;
  height:100%;
  background:#fff;
  padding:20px;
  transition:0.3s;
  z-index:999;
}

.cart.active{
  right:0;
}

.close{
  font-size:22px;
  cursor:pointer;
}

#cart-items{
  margin:15px 0;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button.order{
  width:100%;
  padding:14px;
  background:#111;
  color:#fff;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>CANDLES HOME</h1>

<div class="cart-btn" onclick="toggleCart()">🛒</div>

<!-- товары -->
<div class="products">

<div class="product">
  <img src="https://images.unsplash.com/photo-1603006905003-be475563bc59">
  <div class="info">
    <b>Свічка Classic</b>
    <div>Ароматична свічка</div>
    <div class="bottom">
      <b>150 грн</b>
      <button class="btn" onclick="addToCart('Свічка Classic',150)">В кошик</button>
    </div>
  </div>
</div>

<div class="product">
  <img src="https://images.unsplash.com/photo-1596461404969-9ae70f2830c1">
  <div class="info">
    <b>Свічка Black</b>
    <div>Стильна чорна</div>
    <div class="bottom">
      <b>180 грн</b>
      <button class="btn" onclick="addToCart('Свічка Black',180)">В кошик</button>
    </div>
  </div>
</div>

</div>

<!-- корзина -->
<div class="cart">
  <div class="close" onclick="toggleCart()">✖</div>

  <h3>Кошик</h3>

  <div id="cart-items">Порожньо</div>
  <b id="total">Разом: 0 грн</b>

  <input id="name" placeholder="Ім’я">
  <input id="phone" placeholder="Телефон">

  <button class="order" onclick="order()">Замовити</button>
</div>

<script>
let cart = [];

function toggleCart(){
  document.querySelector(".cart").classList.toggle("active");
}

function addToCart(name, price){
  cart.push({name, price});
  renderCart();
}

function renderCart(){
  let container = document.getElementById("cart-items");
  let total = 0;

  if(cart.length === 0){
    container.innerHTML = "Порожньо";
    document.getElementById("total").innerText = "Разом: 0 грн";
    return;
  }

  container.innerHTML = "";

  cart.forEach(item => {
    container.innerHTML += item.name + " - " + item.price + " грн<br>";
    total += item.price;
  });

  document.getElementById("total").innerText = "Разом: " + total + " грн";
}

function order(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;

  let text = "Замовлення\n";

  cart.forEach(item=>{
    text += item.name + " - " + item.price + " грн\n";
  });

  text += "\n👤 " + name + "\n📞 " + phone;

  fetch("https://api.telegram.org/botYOUR_TOKEN/sendMessage",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      chat_id:"YOUR_CHAT_ID",
      text:text
    })
  });

  alert("Замовлення відправлено");
}
</script>

</body>
</html>
