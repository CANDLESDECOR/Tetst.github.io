<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CANDLES HOME</title>

<style>
body{
margin:0;
font-family:-apple-system;
background:#050505;
color:#fff;
}

h1{
padding:20px;
font-weight:600;
}

/* 🔥 КАРУСЕЛЬ */
.slider{
width:100%;
overflow:hidden;
}

.slides{
display:flex;
animation:slide 12s infinite;
}

.slides img{
width:100%;
height:260px;
object-fit:cover;
}

@keyframes slide{
0%{transform:translateX(0)}
25%{transform:translateX(-100%)}
50%{transform:translateX(-200%)}
75%{transform:translateX(-300%)}
100%{transform:translateX(0)}
}

/* 💎 СТЕКЛО */
.glass{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(25px);
border-radius:20px;
padding:12px;
margin:14px;
}

/* 📦 КАТЕГОРИИ */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.cat{
text-align:center;
padding:18px;
border-radius:18px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(30px);
cursor:pointer;
transition:.3s;
}

.cat:hover{
transform:scale(1.05);
}

.cat img{
width:70px;
height:70px;
object-fit:cover;
border-radius:14px;
margin-bottom:8px;
}

/* 🛒 КОРЗИНА */
.cart{
position:fixed;
bottom:0;
left:0;
right:0;
padding:12px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(30px);
}

button{
width:100%;
padding:12px;
border:none;
border-radius:14px;
background:#fff;
color:#000;
margin-top:8px;
font-weight:600;
}

input{
width:100%;
padding:10px;
border:none;
border-radius:10px;
margin-top:6px;
}

/* 📱 ИНСТА */
.insta{
margin:14px;
padding:14px;
text-align:center;
border-radius:18px;
background:linear-gradient(45deg,#fd5949,#d6249f,#285AEB);
color:#fff;
font-weight:600;
}
</style>

</head>

<body>

<h1>CANDLES HOME</h1>

<!-- 🔥 БАННЕР КАРУСЕЛЬ -->
<div class="slider">
<div class="slides">
<img src="https://images.unsplash.com/photo-1602874801006-e26e4a0e7a0b">
<img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3c">
<img src="https://images.unsplash.com/photo-1616627450151-516c2a1c61f7">
<img src="https://images.unsplash.com/photo-1587019158091-1a103c5dd17f">
</div>
</div>

<!-- 📦 КАТЕГОРИИ -->
<div class="glass">
<div class="grid">

<div class="cat">
<img src="https://images.unsplash.com/photo-1585386959984-a41552231658">
Лофт
</div>

<div class="cat">
<img src="https://images.unsplash.com/photo-1602874801006-e26e4a0e7a0b">
Класик
</div>

<div class="cat">
<img src="https://images.unsplash.com/photo-1616627450151-516c2a1c61f7">
Десерт
</div>

<div class="cat">
<img src="https://images.unsplash.com/photo-1587019158091-1a103c5dd17f">
Кашпо
</div>

</div>
</div>

<!-- 📱 INSTAGRAM -->
<div class="insta" onclick="window.open('https://instagram.com/candleshome.store')">
Перейти в Instagram
</div>

<!-- 🛒 КОРЗИНА -->
<div class="cart">

<div id="cartItems">Кошик порожній</div>

<input id="name" placeholder="Ім'я">
<input id="phone" placeholder="Телефон">

<button onclick="order()">Швидке замовлення</button>

</div>

<script>

<script>
function order(){

let name = document.getElementById("name").value.trim();
let phone = document.getElementById("phone").value.trim();

if(!name || !phone){
alert("Введіть ім'я і телефон");
return;
}

let text = "🛒 НОВЕ ЗАМОВЛЕННЯ\n\n";
text += "Ім'я: " + name + "\n";
text += "Телефон: " + phone;

// ТВОЙ БОТ
const TOKEN = "8706193551:AAELif4O7facDZT6JKYQGRpqx5kBsJ3CkyE";
const CHAT_ID = "862977657";

fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
chat_id: CHAT_ID,
text: text
})
})
.then(res=>res.json())
.then(data=>{
if(data.ok){
alert("Замовлення відправлено");
document.getElementById("name").value="";
document.getElementById("phone").value="";
}else{
alert("Помилка: " + data.description);
}
})
.catch(()=>{
alert("Помилка відправки");
});

}
</script>
}

</script>

</body>
</html>
