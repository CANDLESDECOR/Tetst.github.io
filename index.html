<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANDLES HOME</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont;
  background:#000;
  color:#fff;
}

/* HEADER */
h1{
  padding:20px;
  font-size:28px;
}

/* БАННЕР */
.banner{
  height:180px;
  margin:0 16px;
  border-radius:24px;
  background:url('https://images.unsplash.com/photo-1603006905003-be475563bc59') center/cover;
  position:relative;
  overflow:hidden;
}

.banner::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(8px);
}

/* БАННЕР СЛАЙДЫ */
.banners{
  display:flex;
  gap:12px;
  padding:16px;
  overflow:auto;
}

.slide{
  min-width:220px;
  height:100px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:600;
}

/* КАТЕГОРИИ */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  padding:16px;
}

.card{
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(30px);
  border-radius:22px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.card div{
  padding:12px;
  font-size:16px;
}

/* КНОПКА КОРЗИНЫ */
.cart-btn{
  position:fixed;
  top:20px;
  right:20px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(25px);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  z-index:999;
}

/* КОРЗИНА */
.cart{
  position:fixed;
  right:-100%;
  top:0;
  width:80%;
  height:100%;
  background:rgba(0,0,0,0.95);
  backdrop-filter:blur(25px);
  transition:0.4s;
  padding:20px;
  z-index:1000;
}

.cart.active{
  right:0;
}

.cart h3{
  margin-top:0;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:12px;
  border:none;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:14px;
  font-weight:600;
}
</style>
</head>

<body>

<h1>CANDLES HOME</h1>

<!-- БАННЕР -->
<div class="banner"></div>

<!-- СЛАЙДЫ -->
<div class="banners">
  <div class="slide">Знижки</div>
  <div class="slide">Новинки</div>
  <div class="slide">Хіти</div>
</div>

<!-- КАТЕГОРИИ -->
<div class="grid">

<div class="card" onclick="addToCart('Loft')">
  <img src="https://images.unsplash.com/photo-1602524815924-7c4b0a7d5f8d">
  <div>Loft</div>
</div>

<div class="card" onclick="addToCart('Classic')">
  <img src="https://images.unsplash.com/photo-1616628182506-1f3f954ed7be">
  <div>Classic</div>
</div>

<div class="card" onclick="addToCart('Десертні')">
  <img src="https://images.unsplash.com/photo-1602874801006-e26f3c1d0c92">
  <div>Десертні</div>
</div>

<div class="card" onclick="addToCart('Кашпо')">
  <img src="https://images.unsplash.com/photo-1616627454026-48c58c2c299c">
  <div>Кашпо</div>
</div>

</div>

<!-- КНОПКА -->
<div class="cart-btn" onclick="toggleCart()">🛒</div>

<!-- КОРЗИНА -->
<div class="cart">
  <h3>Кошик</h3>
  <div id="cart-items">Кошик порожній</div>

  <input id="name" placeholder="Ім'я">
  <input id="phone" placeholder="Телефон">

  <button onclick="order()">Замовити</button>
</div>

<script>
function order(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;

if(!name || !phone){
alert("Заповни дані");
return;
}

let text = `НОВЕ ЗАМОВЛЕННЯ:
Ім'я: ${name}
Телефон: ${phone}`;

// ТВОЙ API
let url = "https://api.telegram.org/bot8706193551:AAELif4O7facDZT6JKYQGRpqx5kBsJ3CkyE/sendMessage?chat_id=862977657&text=" + encodeURIComponent(text);

// ОТПРАВКА
window.open(url, "_blank");

alert("Заявка відправлена 🔥");
}
</script>

</body>
</html>
