<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANDLES HOME</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#000;
  color:#fff;
}

h1{
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

.card{
  background:#111;
  border-radius:20px;
  padding:20px;
  text-align:center;
  cursor:pointer;
}

.card:hover{
  background:#222;
}

/* кнопка корзины */
.cart-btn{
  position:fixed;
  top:20px;
  right:20px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  z-index:1000;
}

/* overlay */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}

.overlay.active{
  opacity:1;
  pointer-events:auto;
}

/* корзина */
.cart{
  position:fixed;
  right:-100%;
  top:0;
  width:80%;
  height:100%;
  background:#111;
  padding:20px;
  transition:0.3s;
  z-index:1001;
}

.cart.active{
  right:0;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>CANDLES HOME</h1>

<div class="grid">
  <div class="card" onclick="addToCart('Loft')">Loft</div>
  <div class="card" onclick="addToCart('Classic')">Classic</div>
  <div class="card" onclick="addToCart('Десертні')">Десертні</div>
  <div class="card" onclick="addToCart('Кашпо')">Кашпо</div>
</div>

<!-- кнопка -->
<div class="cart-btn" onclick="toggleCart()">🛒</div>

<!-- затемнение -->
<div class="overlay" onclick="toggleCart()"></div>

<!-- корзина -->
<div class="cart">
  <h2>Кошик</h2>

  <div id="cart-items">Кошик порожній</div>

  <input id="name" placeholder="Ім'я">
  <input id="phone" placeholder="Телефон">

  <button onclick="order()">Замовити</button>
</div>

<script>
let cart = [];

function addToCart(item){
  cart.push(item);
  updateCart();
}

function updateCart(){
  const el = document.getElementById("cart-items");

  if(cart.length === 0){
    el.innerHTML = "Кошик порожній";
  }else{
    el.innerHTML = cart.map(i => "• " + i).join("<br>");
  }
}

function toggleCart(){
  document.querySelector(".cart").classList.toggle("active");
  document.querySelector(".overlay").classList.toggle("active");
}

function order(){

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;

  if(cart.length === 0){
    alert("Додай товар");
    return;
  }

  if(!name || !phone){
    alert("Заповни дані");
    return;
  }

  let text =
  "🔥 ЗАМОВЛЕННЯ\n\n" +
  "🛒 " + cart.join(", ") + "\n" +
  "👤 " + name + "\n" +
  "📞 " + phone;

  const url =
  "https://api.telegram.org/bot8706193551:AAEyRssAkXNJt7gp6Nh45ArL7DKAJTEKhFA/sendMessage?chat_id=8706193551&text="
  + encodeURIComponent(text);

  fetch(url)
  .then(res => res.json())
  .then(data=>{
    if(data.ok){
      alert("Відправлено 🔥");
      cart = [];
      updateCart();
    }else{
      alert("Помилка: " + data.description);
    }
  })
  .catch(()=>{
    alert("Помилка мережі");
  });

}
</script>

</body>
</html>
