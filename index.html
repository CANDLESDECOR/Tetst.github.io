<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANDLES HOME</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;color:#111;}
h1{padding:20px;margin:0;}

.cart-btn{
position:fixed;top:20px;right:20px;
width:55px;height:55px;background:#fff;border-radius:50%;
display:flex;align-items:center;justify-content:center;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.grid{padding:15px;display:grid;gap:10px;}
.card{background:#fff;padding:20px;border-radius:15px;}

.promo{overflow:hidden;background:#fff;}
.promo-track{
display:flex;gap:20px;
animation:scroll 20s linear infinite;
}
@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

.cart{
position:fixed;bottom:-100%;left:0;width:100%;
background:#fff;padding:20px;transition:0.3s;
}
.cart.active{bottom:0;}

</style>
</head>

<body>

<h1>CANDLES HOME</h1>

<div class="cart-btn" onclick="toggleCart()">🛒</div>

<div class="promo">
<div class="promo-track">
<div>🔥 Знижки</div><div>🚚 Доставка</div><div>✨ Новинки</div>
<div>🔥 Знижки</div><div>🚚 Доставка</div><div>✨ Новинки</div>
</div>
</div>

<div class="grid">
<a href="classic.html" class="card">Classic</a>
<a href="classic.html" class="card">Loft</a>
<a href="classic.html" class="card">Десертні</a>
<a href="classic.html" class="card">Кашпо</a>
</div>

<div class="cart">
<h3>Кошик</h3>
<div id="cart-items"></div>
<div id="total"></div>

<input id="name" placeholder="Ім’я">
<input id="phone" placeholder="Телефон">

<button onclick="order()">Замовити</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart"))||[];

function toggleCart(){
document.querySelector(".cart").classList.toggle("active");
}

function renderCart(){
let list=document.getElementById("cart-items");
let total=0;
list.innerHTML="";
cart.forEach(i=>{
total+=i.price;
list.innerHTML+=i.name+" "+i.price+" грн<br>";
});
document.getElementById("total").innerHTML="Разом: "+total;
}

function order(){
alert("Замовлення відправлено");
}

renderCart();
</script>

</body>
</html>
