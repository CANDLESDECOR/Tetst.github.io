<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CANDLES HOME</title>

<style>

body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(145deg,#0f0f0f,#1a1a1a);
    color:#fff;
}

/* заголовок */
h1{
    padding:20px;
    font-size:28px;
}

/* КАРТОЧКИ */
.card, .form, .bottom{
    margin:15px;
    padding:18px;
    border-radius:22px;

    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(25px);

    border:1px solid rgba(255,255,255,0.12);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.2),
        inset 0 -2px 6px rgba(0,0,0,0.4),
        0 15px 40px rgba(0,0,0,0.7),
        0 5px 15px rgba(255,255,255,0.05);

    position:relative;
}

/* БЛИК */
.card::before, .form::before, .bottom::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:50%;
    border-radius:22px;

    background: linear-gradient(
        180deg,
        rgba(255,255,255,0.25),
        rgba(255,255,255,0.05),
        transparent
    );
}

/* карусель */
.slider{
    display:flex;
    gap:10px;
    overflow-x:auto;
}

.item{
    min-width:180px;
}

/* кнопка */
.btn{
    margin-top:10px;
    padding:14px;
    border-radius:18px;
    text-align:center;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);

    border:1px solid rgba(255,255,255,0.15);

    box-shadow:
        inset 0 1px 2px rgba(255,255,255,0.3),
        inset 0 -2px 6px rgba(0,0,0,0.5),
        0 8px 20px rgba(0,0,0,0.6),
        0 2px 6px rgba(255,255,255,0.1);

    cursor:pointer;
}

/* поля */
input, select{
    width:100%;
    padding:14px;
    margin-top:10px;

    border-radius:14px;
    border:none;

    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(20px);

    color:#fff;
}

/* цены */
.old{
    text-decoration: line-through;
    opacity:0.5;
}

</style>
</head>

<body>

<h1>CANDLES HOME</h1>

<div class="card">
<div class="slider">

<div class="item">
Коньячный бокал<br>
<span class="old">400</span> 299 грн 🔥
<div class="btn">Обрати</div>
</div>

<div class="item">
Свічка Кава<br>
<span class="old">260</span> 159 грн 🔥
<div class="btn">Обрати</div>
</div>

<div class="item">
Десерт<br>
<span class="old">320</span> 219 грн 🔥
<div class="btn">Обрати</div>
</div>

<div class="item">
Свічка в кашпо<br>
<span class="old">260</span> 159 грн 🔥
<div class="btn">Обрати</div>
</div>

<div class="item">
Кашпо + свічки<br>
<span class="old">250</span> 149 грн 🔥
<div class="btn">Обрати</div>
</div>

<div class="item">
Бокал Шампань<br>
<span class="old">300</span> 199 грн 🔥
<div class="btn">Обрати</div>
</div>

</div>
</div>

<div class="form">
<h2>Оформлення замовлення</h2>

<select>
<option>Оберіть товар</option>
</select>

<input placeholder="Ваше ім'я">
<input placeholder="Телефон">
<input placeholder="Місто НП">
<input placeholder="Відділення НП">

<div class="btn">Замовити</div>

</div>

<div class="bottom">
<h3>Більше асортименту:</h3>

<div style="display:flex;gap:10px;">
<div class="btn">Telegram</div>
<div class="btn">Instagram</div>
</div>

</div>

</body>
</html>
