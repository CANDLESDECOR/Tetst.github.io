<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANDLES HOME</title>

<style>
body{
margin:0;
font-family:-apple-system;
background:#000;
color:#fff;
}

h1{
padding:20px;
font-size:28px;
}

/* БАННЕР */
.banner{
height:220px;
background:url('https://images.unsplash.com/photo-1603006905003-be475563bc59') center/cover;
border-radius:20px;
margin:0 16px;
}

/* СЕТКА */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
padding:16px;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:20px;
padding:16px;
text-align:center;
transition:0.2s;
}

.card:active{
transform:scale(0.96);
}

.card img{
width:100%;
height:100px;
object-fit:cover;
border-radius:12px;
margin-bottom:10px;
}

/* КОРЗИНА */
.cart{
margin:40px 16px 20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:20px;
padding:16px;
}
.cart-btn{
position:fixed;
right:16px;
bottom:20px;
width:55px;
height:55px;
border-radius:50%;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(20px);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
z-index:999;
}
input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:none;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-weight:600;
}
</style>
</head>

<body>

<h1>CANDLES HOME</h1>

<div class="banner"></div>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1602524810953-b1d5b5a3f8b0">
Лофт
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1616628182506-1f3f954ed7be">
Класик
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1602874801006-e26f3c1d0c92">
Десерт
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1616627454026-48c58c2c299c">
Свічки в кашпо
</div>

</div>

<div class="cart">
<div>Кошик порожній</div>

<input id="name" placeholder="Ім'я">
<input id="phone" placeholder="Телефон">

<button onclick="order()">Швидке замовлення</button>
</div>

<script>
function order(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;

if(!name || !phone){
alert("Заповни дані");
return;
}

let text = "НОВЕ ЗАМОВЛЕННЯ\n\nІм'я: "+name+"\nТелефон: "+phone;

fetch("https://api.telegram.org/bot8706193551:AAELif4O7facDZT6JKYQGRpqx5kBsJ3CkyE/sendMessage",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id:"862977657",
text:text
})
})
.then(()=>alert("Відправлено"));
}
</script>
<div class="cart-btn" onclick="toggleCart()">🛒</div>
</body>
</html>
