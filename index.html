<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANDLES HOME</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:-apple-system,BlinkMacSystemFont,system-ui;
background:#000;
color:#fff;
overflow-x:hidden;
}

/* контейнер */
.container{
padding:20px;
}

/* заголовок */
h1{
font-size:22px;
font-weight:600;
margin-bottom:20px;
}

/* категории */
.menu{
display:flex;
gap:10px;
margin-bottom:20px;
overflow-x:auto;
}

.menu div{
padding:10px 16px;
border-radius:20px;
background:#111;
white-space:nowrap;
cursor:pointer;
transition:0.3s;
}

.menu .active{
background:#fff;
color:#000;
}

/* сетка */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

/* карточка */
.card{
position:relative;
border-radius:20px;
overflow:hidden;
background:#111;
cursor:pointer;
transition:0.4s;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card h3{
position:absolute;
bottom:10px;
left:10px;
font-size:14px;
}

/* hover эффект */
.card:hover{
transform:scale(1.03);
}

/* АНИМАЦИЯ */
.fade{
animation:fade 0.5s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

/* МОДАЛ */
.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:#000;
z-index:100;
display:none;
flex-direction:column;
animation:fade 0.4s;
}

.modal.active{
display:flex;
}

.modal img{
width:100%;
height:50vh;
object-fit:cover;
}

.modal-content{
padding:20px;
}

.close{
padding:15px;
font-size:18px;
opacity:0.6;
cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<h1>CANDLES HOME</h1>

<div class="menu">
<div class="active" onclick="setCat('all')">All</div>
<div onclick="setCat('classic')">Classic</div>
<div onclick="setCat('loft')">Loft</div>
<div onclick="setCat('kashpo')">Kashpo</div>
<div onclick="setCat('dessert')">Dessert</div>
</div>

<div id="grid" class="grid fade"></div>

</div>

<!-- МОДАЛ -->
<div id="modal" class="modal">
<div class="close" onclick="closeModal()">←</div>
<img id="modalImg">
<div class="modal-content">
<h2 id="modalTitle"></h2>
<p style="opacity:0.6;margin-top:10px;">
Преміальний виріб ручної роботи. Мінімалізм, стиль та атмосфера.
</p>
</div>
</div>

<script>

let products=[
{title:"Classic Candle",cat:"classic",img:"1.jpg"},
{title:"Loft Candle",cat:"loft",img:"2.jpg"},
{title:"Kashpo Candle",cat:"kashpo",img:"3.jpg"},
{title:"Dessert Candle",cat:"dessert",img:"4.jpg"}
];

let current="all";

function render(){
let grid=document.getElementById("grid");
grid.innerHTML="";

products
.filter(p=>current==="all"||p.cat===current)
.forEach(p=>{
grid.innerHTML+=`
<div class="card" onclick="openProduct('${p.title}','${p.img}')">
<img src="${p.img}">
<h3>${p.title}</h3>
</div>
`;
});
}

function setCat(cat){
current=cat;
document.querySelectorAll('.menu div').forEach(b=>b.classList.remove('active'));
event.target.classList.add('active');
render();
}

function openProduct(title,img){
document.getElementById("modal").classList.add("active");
document.getElementById("modalTitle").innerText=title;
document.getElementById("modalImg").src=img;
}

function closeModal(){
document.getElementById("modal").classList.remove("active");
}

render();

</script>

</body>
</html>
