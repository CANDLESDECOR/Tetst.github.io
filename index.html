<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANDLES HOME</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
}

h1{
padding:20px;
margin:0;
}

.banner{
height:200px;
margin:0 16px;
border-radius:20px;
background:url('https://images.unsplash.com/photo-1603006905003-be475563bc59') center/cover;
}

/* категории */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
padding:16px;
}

.card{
display:block;
text-decoration:none;
color:#fff;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border-radius:20px;
overflow:hidden;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card div{
padding:10px;
}

/* товары */
.products{
padding:16px;
}

.product{
background:#111;
padding:10px;
border-radius:16px;
margin-bottom:10px;
}

.product button{
width:100%;
padding:10px;
margin-top:6px;
}

/* кнопка корзины */
.cart-btn{
position:fixed;
top:20px;
right:16px;
width:50px;
height:50px;
background:#222;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
cursor:pointer;
}

/* корзина */
.cart{
position:fixed;
right:-100%;
top:0;
width:85%;
height:100%;
background:#111;
transition:0.3s;
padding:16px;
z-index:999;
}

.cart.active{
right:0;
}

input{
width:100%;
padding:10px;
margin-top:8px;
}
</style>
</head>

<body>

<h1>CANDLES HOME</h1>

<div class="banner"></div>

<!-- категории -->
<div class="grid">
<a class="card" href="#"><img src="https://images.unsplash.com/photo-1519681393784-d120267933ba"><div>Loft</div></a>
<a class="card" href="#"><img src="https://images.unsplash.com/photo-1602874801006-e26f3c1d0c92"><div>Classic</div></a>
<a class="card" href="#"><img src="https://images.unsplash.com/photo-1541782814456-9d4bcbf3d0c7"><div>Десертні</div></a>
<a class="card" href="#"><img src="https://images.unsplash.com/photo-1602526217077-9c3fdfc0a1e4"><div>Кашпо</div></a>
</div>

<!-- ТОВАРЫ (пример) -->
<div class="products">

<div class="product">
<div>Свічка Loft</div>
<button onclick="add('Свічка Loft')">Додати</button>
</div>

<div class="product">
<div>Свічка Classic</div>
<button onclick="add('Свічка Classic')">Додати</button>
</div>

</div>

<!-- кнопка -->
<div class="cart-btn" onclick="toggleCart()">🛒</div>

<!-- корзина -->
<div class="cart" id="cart">

<h2>Кошик</h2>

<div id="list"></div>

<input id="name" placeholder="Ім'я">
<input id="phone" placeholder="Телефон">

<button onclick="order()">Замовити</button>

</div>

<script>

let cart = [];

function toggleCart(){
document.getElementById('cart').classList.toggle('active');
}

function add(name){
cart.push(name);
render();
}

function render(){
let list = document.getElementById('list');

if(cart.length === 0){
list.innerHTML = "Порожньо";
return;
}

list.innerHTML = cart.map(i => "<div>"+i+"</div>").join("");
}

function order(){

let name = document.getElementById('name').value;
let phone = document.getElementById('phone').value;

if(!name || !phone){
alert("Заповни дані");
return;
}

let text = "Замовлення:\n" + cart.join(", ") + "\nІм'я: " + name + "\nТелефон: " + phone;

fetch("https://api.telegram.org/bot8706193551:AAELif4O7facDZT6JKYQGRpqx5kBsJ3CkyE/sendMessage",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id:"862977657",
text:text
})
});

alert("Відправлено");
cart = [];
render();

}

</script>

</body>
</html>
