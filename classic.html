<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classic | Candles Home</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
  color:#111;
}

/* header */
.header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:20px;
  font-size:22px;
  font-weight:700;
}

.back{
  font-size:20px;
  text-decoration:none;
  color:#111;
}

/* список */
.products{
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

/* карточка */
.product{
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* фото */
.product img{
  width:100%;
  height:160px;
  object-fit:cover;
}

/* контент */
.info{
  padding:15px;
}

/* название */
.title{
  font-size:18px;
  font-weight:600;
}

/* описание */
.desc{
  font-size:14px;
  color:#666;
  margin:5px 0 10px;
}

/* низ */
.bottom{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* цена */
.price{
  font-weight:700;
}

/* кнопка */
.btn{
  padding:10px 15px;
  border:none;
  background:#111;
  color:#fff;
  border-radius:10px;
  cursor:pointer;
}

.btn:active{
  transform:scale(0.95);
}
</style>
</head>

<body>

<div class="header">
  <a href="index.html" class="back">←</a>
  Classic
</div>

<div class="products">

  <!-- товар -->
  <div class="product">
    <img src="https://images.unsplash.com/photo-1603006905003-be475563bc59">
    <div class="info">
      <div class="title">Свічка Classic</div>
      <div class="desc">Ароматична свічка для затишку вдома</div>
      <div class="bottom">
        <div class="price">150 грн</div>
        <button class="btn">В кошик</button>
      </div>
    </div>
  </div>

  <!-- товар -->
  <div class="product">
    <img src="https://images.unsplash.com/photo-1596461404969-9ae70f2830c1">
    <div class="info">
      <div class="title">Свічка Black</div>
      <div class="desc">Стильна чорна свічка мінімал дизайн</div>
      <div class="bottom">
        <div class="price">180 грн</div>
        <button class="btn">В кошик</button>
      </div>
    </div>
  </div>

</div>

</body>
</html>
