<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classic</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}
h1{padding:20px;margin:0;}

.products{
  padding:15px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.product{
  background:#fff;
  border-radius:20px;
  overflow:hidden;
}

.product img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.info{padding:10px;}

button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  background:#111;
  color:#fff;
}
</style>
</head>

<body>

<h1 onclick="location.href='index.html'">← Classic</h1>

<div class="products">

<div class="product">
<img src="https://images.unsplash.com/photo-1603006905003-be475563bc59">
<div class="info">
Свічка Classic — 150 грн
<button onclick="add('Classic',150)">В кошик</button>
</div>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1596461404969-9ae70f2830c1">
<div class="info">
Свічка Black — 180 грн
<button onclick="add('Black',180)">В кошик</button>
</div>
</div>

</div>

<!-- КОРЗИНА -->
<div id="cart"></div>

<script>
function add(name, price){
  let cart = JSON.parse(localStorage.getItem("cart") || "[]");
  cart.push({name, price});
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Додано");
}
</script>

</body>
</html>
